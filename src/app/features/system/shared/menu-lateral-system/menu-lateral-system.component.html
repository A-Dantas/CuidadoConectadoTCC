<!-- Overlay for mobile when sidebar is open -->
<div class="sidebar-overlay" *ngIf="isOpen" (click)="closeSidebar()"></div>

<main [class.open]="isOpen">
    <div class="container_menu">
        <div class="content_menu">
            
            <!-- MENU GESTOR OU FALLBACK -->
            <ng-container *ngIf="userRole === 'Manager' || !userRole || userRole === 'gestor'">
                <div class="opcoes_menu" [class.selecionado]="menuSelecionado === 1" (click)="selecionarMenu(1); notificationService.clearDot('Visão Geral')">
                    <div><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 20" width="20" height="20" fill="rgba(62,153,114,1)"><path d="M14 21C13.4477 21 13 20.5523 13 20V12C13 11.4477 13.4477 11 14 11H20C20.5523 11 21 11.4477 21 12V20C21 20.5523 20.5523 21 20 21H14ZM4 13C3.44772 13 3 12.5523 3 12V4C3 3.44772 3.44772 3 4 3H10C10.5523 3 11 3.44772 11 4V12C11 12.5523 10.5523 13 10 13H4ZM9 11V5H5V11H9Z"></path></svg></div>
                    <div style="position: relative;">
                        <h1>Visão Geral</h1>
                        <span class="bolinha-vermelha-menu" *ngIf="hasNotification('Visão Geral')"></span>
                    </div>
                </div>
                <div class="opcoes_menu" [class.selecionado]="menuSelecionado === 2" (click)="selecionarMenu(2); notificationService.clearDot('Pacientes')">
                    <div><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 20" width="20" height="20" fill="rgba(62,153,114,1)"><path d="M17.841 15.659L18.017 15.836C19.0732 14.7803 20.4978 14.7803 21.3765 15.659C22.2552 16.5377 22.2552 17.9623 21.3765 18.841L18.0178 22.1997L14.659 18.841C13.7803 17.9623 13.7803 16.5377 14.659 15.659C15.5377 14.7803 16.9623 14.7803 17.841 15.659ZM12 14V16C8.68629 16 6 18.6863 6 22H4C4 17.6651 7.44784 14.1355 11.7508 14.0038L12 14ZM12 1C15.315 1 18 3.685 18 7C18 10.2397 15.4357 12.8776 12.225 12.9959L12 13C8.685 13 6 10.315 6 7C6 3.76034 8.56434 1.12237 11.775 1.00414L12 1Z"></path></svg></div>
                    <div style="position: relative;">
                        <h1>Pacientes</h1>
                        <span class="bolinha-vermelha-menu" *ngIf="hasNotification('Pacientes')"></span>
                    </div>
                </div>
                <div class="opcoes_menu" [class.selecionado]="menuSelecionado === 3" (click)="selecionarMenu(3); notificationService.clearDot('Usuários')">
                    <div><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 20" width="20" height="20" fill="rgba(62,153,114,1)"><path d="M2 22C2 17.5817 5.58172 14 10 14C14.4183 14 18 17.5817 18 22H16C16 18.6863 13.3137 16 10 16C6.68629 16 4 18.6863 4 22H2ZM10 13C6.685 13 4 10.315 4 7C4 3.685 6.685 1 10 1C13.315 1 16 3.685 16 7C16 10.315 13.315 13 10 13ZM10 11C12.21 11 14 9.21 14 7C14 4.79 12.21 3 10 3C7.79 3 6 4.79 6 7C6 9.21 7.79 11 10 11ZM18.2837 14.7028C21.0644 15.9561 23 18.752 23 22H21C21 19.564 19.5483 17.4671 17.4628 16.5271L18.2837 14.7028Z"></path></svg></div>
                    <div style="position: relative;">
                        <h1>Usuários</h1>
                        <span class="bolinha-vermelha-menu" *ngIf="hasNotification('Usuários')"></span>
                    </div>
                </div>
                <div class="opcoes_menu" [class.selecionado]="menuSelecionado === 4" (click)="selecionarMenu(4); notificationService.clearDot('Agendar')">
                    <div><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 20" width="20" height="20" fill="rgba(62,153,114,1)"><path d="M9 1V3H15V1H17V3H21C21.5523 3 22 3.44772 22 4V20C22 20.5523 21.5523 21 21 21H3C2.44772 21 2 20.5523 2 20V4C2 3.44772 2.44772 3 3 3H7V1H9ZM20 11H4V19H20V11ZM7 5H4V9H20V5H17V7H15V5H9V7H7V5Z"></path></svg></div>
                    <div style="position: relative;">
                        <h1>Agendar</h1>
                        <span class="bolinha-vermelha-menu" *ngIf="hasNotification('Agendar')"></span>
                    </div>
                </div>
                <div class="opcoes_menu" [class.selecionado]="menuSelecionado === 5" (click)="selecionarMenu(5); notificationService.clearDot('Currículos')">
                    <div><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="rgba(62,153,114,1)"><path d="M7 2V4H5V18H19V4H17V2H21C21.5523 2 22 2.44772 22 3V19C22 19.5523 21.5523 20 21 20H3C2.44772 20 2 19.5523 2 19V3C2 2.44772 2.44772 2 3 2H7ZM11 2V4H9V2H11ZM15 2V4H13V2H15ZM7 6H17V8H7V6ZM7 10H17V12H7V10ZM7 14H13V16H7V14Z"></path></svg></div>
                    <div style="position: relative;">
                        <h1>Currículos</h1>
                        <span class="bolinha-vermelha-menu" *ngIf="hasNotification('Currículos')"></span>
                    </div>
                </div>
            </ng-container>

            <!-- MENU CUIDADOR -->
            <ng-container *ngIf="userRole === 'Caregiver'">
                <div class="opcoes_menu" [class.selecionado]="menuSelecionado === 1" (click)="selecionarMenu(1); notificationService.clearDot('Meus Plantões')">
                    <div><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 20" width="20" height="20" fill="rgba(62,153,114,1)"><path d="M14 21C13.4477 21 13 20.5523 13 20V12C13 11.4477 13.4477 11 14 11H20C20.5523 11 21 11.4477 21 12V20C21 20.5523 20.5523 21 20 21H14ZM4 13C3.44772 13 3 12.5523 3 12V4C3 3.44772 3.44772 3 4 3H10C10.5523 3 11 3.44772 11 4V12C11 12.5523 10.5523 13 10 13H4ZM9 11V5H5V11H9Z"></path></svg></div>
                    <div style="position: relative;">
                        <h1>Meus Plantões</h1>
                        <span class="bolinha-vermelha-menu" *ngIf="hasNotification('Meus Plantões')"></span>
                    </div>
                </div>
                <div class="opcoes_menu" [class.selecionado]="menuSelecionado === 2" (click)="selecionarMenu(2); notificationService.clearDot('Histórico')">
                    <div><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 20" width="20" height="20" fill="rgba(62,153,114,1)"><path d="M13 3V5H21V3H13ZM13 11V13H21V11H13ZM13 19V21H21V19H13ZM3 3H11V13H3V3ZM3 15H11V21H3V15Z"></path></svg></div>
                    <div style="position: relative;">
                        <h1>Histórico</h1>
                        <span class="bolinha-vermelha-menu" *ngIf="hasNotification('Histórico')"></span>
                    </div>
                </div>
            </ng-container>

            <!-- MENU FAMILIAR -->
            <ng-container *ngIf="userRole === 'Family Member'">
                <div class="opcoes_menu" [class.selecionado]="menuSelecionado === 1" (click)="selecionarMenu(1); notificationService.clearDot('Meu Idoso')">
                    <div><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 20" width="20" height="20" fill="rgba(62,153,114,1)"><path d="M12 1L1 11H3V21H21V11H23L12 1ZM12 5.5L18 11V19H6V11L12 5.5Z"></path></svg></div>
                    <div style="position: relative;">
                        <h1>Meu Idoso</h1>
                        <span class="bolinha-vermelha-menu" *ngIf="hasNotification('Meu Idoso')"></span>
                    </div>
                </div>
                <div class="opcoes_menu" [class.selecionado]="menuSelecionado === 2" (click)="selecionarMenu(2); notificationService.clearDot('Agenda')">
                    <div><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 20" width="20" height="20" fill="rgba(62,153,114,1)"><path d="M9 1V3H15V1H17V3H21C21.5523 3 22 3.44772 22 4V20C22 20.5523 21.5523 21 21 21H3C2.44772 21 2 20.5523 2 20V4C2 3.44772 2.44772 3 3 3H7V1H9ZM20 11H4V19H20V11Z"></path></svg></div>
                    <div style="position: relative;">
                        <h1>Agenda</h1>
                        <span class="bolinha-vermelha-menu" *ngIf="hasNotification('Agenda')"></span>
                    </div>
                </div>
                <div class="opcoes_menu" [class.selecionado]="menuSelecionado === 3" (click)="selecionarMenu(3); notificationService.clearDot('Linha do Tempo')">
                    <div><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 20" width="20" height="20" fill="rgba(62,153,114,1)"><path d="M13 11V13H21V11H13ZM13 19V21H21V19H13ZM3 3H11V13H3V3ZM3 15H11V21H3V15Z"></path></svg></div>
                    <div style="position: relative;">
                        <h1>Linha do Tempo</h1>
                        <span class="bolinha-vermelha-menu" *ngIf="hasNotification('Linha do Tempo')"></span>
                    </div>
                </div>
            </ng-container>

            <!-- MENU MÉDICO -->
            <ng-container *ngIf="userRole === 'Doctor'">
                <div class="opcoes_menu" [class.selecionado]="menuSelecionado === 1" (click)="selecionarMenu(1); notificationService.clearDot('Meus Pacientes')">
                    <div><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 20" width="20" height="20" fill="rgba(62,153,114,1)"><path d="M12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2ZM11 7V11H7V13H11V17H13V13H17V11H13V7H11Z"></path></svg></div>
                    <div style="position: relative;">
                        <h1>Meus Pacientes</h1>
                        <span class="bolinha-vermelha-menu" *ngIf="hasNotification('Meus Pacientes')"></span>
                    </div>
                </div>
                <div class="opcoes_menu" [class.selecionado]="menuSelecionado === 2" (click)="selecionarMenu(2); notificationService.clearDot('Prontuários')">
                    <div><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 20" width="20" height="20" fill="rgba(62,153,114,1)"><path d="M19 3H5C3.89543 3 3 3.89543 3 5V19C3 20.1046 3.89543 21 5 21H19C20.1046 21 21 20.1046 21 19V5C21 3.89543 20.1046 3 19 3ZM5 5H19V19H5V5ZM7 7V9H17V7H7ZM7 11V13H17V11H7ZM7 15V17H13V15H7Z"></path></svg></div>
                    <div style="position: relative;">
                        <h1>Prontuários</h1>
                        <span class="bolinha-vermelha-menu" *ngIf="hasNotification('Prontuários')"></span>
                    </div>
                </div>
            </ng-container>

        </div>
    </div>
</main>
